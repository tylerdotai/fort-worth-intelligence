app = "fort-worth-intelligence"
primary_region = "dfw"

[build]
dockerfile = "Dockerfile"

[env]
PORT = "8000"
ENVIRONMENT = "production"
# Set in Fly.io secrets:
#   fly secrets set REDIS_URL=redis://default:xxx@xxx.upstash.io:6379/0
#   fly secrets set SENTRY_DSN=https://xxx@xxx.ingest.sentry.io/xxx
REDIS_URL = "redis://localhost:6379/0"
SENTRY_DSN = ""

[http_service]
internal_port = 8000
force_https = true

[[services]]
name = "http"
protocol = "tcp"
internal_port = 8000

  [[services.ports]]
  port = 443
  handlers = [{ Handler = "tls" }]

  [[services.ports]]
  port = 80

  [[services.checks]]
  path = "/health"
  interval = "10s"
  timeout = "5s"
  grace_period = "5s"
