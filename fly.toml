app = "fort-worth-intelligence"
primary_region = "dfw"

[build]
dockerfile = "Dockerfile"

[env]
PORT = "8000"

[http_service]
internal_port = 8000
force_https = true

[[services]]
name = "http"
protocol = "tcp"
internal_port = 8000

  [[services.ports]]
  port = 443
  handlers = [{ Handler = "tls" }]

  [[services.ports]]
  port = 80

  [[services.checks]]
  path = "/health"
  interval = "10s"
  timeout = "5s"
  grace_period = "5s"
