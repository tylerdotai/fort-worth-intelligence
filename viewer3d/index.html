<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fort Worth 3D Twin</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080b12; font-family: system-ui, sans-serif; }
    #cesiumContainer { width: 100vw; height: 100vh; }

    #panel {
      position: fixed; top: 20px; left: 20px; z-index: 100;
      background: rgba(8,11,18,0.93); border: 1px solid rgba(255,107,0,0.3);
      border-radius: 14px; padding: 20px; width: 280px;
      backdrop-filter: blur(16px); color: #ccc;
    }
    h1 { font-size: 16px; font-weight: 700; color: #ff6b00; }
    .sub { font-size: 11px; color: #555; margin-bottom: 16px; display: block; }
    .search { display: flex; gap: 8px; margin-bottom: 14px; }
    input {
      flex: 1; background: rgba(255,107,0,0.06);
      border: 1px solid rgba(255,107,0,0.22); border-radius: 8px;
      padding: 9px 11px; color: #eee; font-size: 13px; outline: none;
    }
    input:focus { border-color: #ff6b00; }
    button {
      background: #ff6b00; color: #000; border: none; border-radius: 8px;
      padding: 9px 14px; font-weight: 600; font-size: 13px; cursor: pointer;
    }
    button:hover { background: #ff8533; }
    .legend-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: #555; margin-bottom: 5px; }
    .legend-bar { height: 7px; border-radius: 4px; background: linear-gradient(to right, #1a3d6b, #2e6da4, #f4d03f, #e67e22, #c0392b); margin-bottom: 3px; }
    .legend-ends { display: flex; justify-content: space-between; font-size: 10px; color: #444; margin-bottom: 12px; }
    .layer-row { display: flex; align-items: center; gap: 9px; padding: 5px 0; font-size: 13px; color: #aaa; border-top: 1px solid rgba(255,255,255,0.04); }
    .layer-row input { width: auto; accent-color: #ff6b00; }
    .layer-row span { flex: 1; }
    .badge { font-size: 10px; color: #444; background: rgba(255,255,255,0.04); padding: 2px 7px; border-radius: 10px; }

    #info {
      position: fixed; bottom: 24px; left: 24px; z-index: 100;
      background: rgba(8,11,18,0.93); border: 1px solid rgba(255,107,0,0.22);
      border-radius: 12px; padding: 16px 20px; width: 270px;
      backdrop-filter: blur(12px); font-size: 13px; display: none;
    }
    #info.show { display: block; }
    #info h3 { color: #ff6b00; font-size: 14px; margin-bottom: 10px; }
    .info-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .info-row:last-child { border: none; }
    .lbl { color: #555; }
    .val { color: #ddd; font-family: 'Courier New', monospace; font-size: 12px; }
    .tag { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-top: 3px; }
    .t-mapbox { background: rgba(35,137,218,0.15); color: #2389da; }
    .t-estimated { background: rgba(80,80,80,0.12); color: #777; }

    #loading {
      position: fixed; inset: 0; background: #080b12; z-index: 999;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px;
    }
    .sp { width: 38px; height: 38px; border: 3px solid rgba(255,107,0,0.12); border-top-color: #ff6b00; border-radius: 50%; animation: sp 0.9s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
    #loading p { color: #555; font-size: 14px; }
    #loading .sub { font-size: 12px; color: #333; }
  </style>
</head>
<body>

<div id="loading">
  <div class="sp"></div>
  <p>Fort Worth 3D Twin</p>
  <p class="sub" id="status">Loading buildings...</p>
</div>

<div id="cesiumContainer"></div>

<div id="panel">
  <h1>Fort Worth 3D Twin</h1>
  <span class="sub">Civic Intelligence — fw intel.dot.fyi</span>
  <div class="search">
    <input id="addrInput" placeholder="Address or intersection" type="text"
           onkeydown="if(event.key==='Enter')geocode()">
    <button onclick="geocode()">Go</button>
  </div>
  <div class="legend-label">Building Height</div>
  <div class="legend-bar"></div>
  <div class="legend-ends"><span>3m</span><span>25m+</span></div>
  <div class="layer-row">
    <input type="checkbox" id="bldgOn" checked onchange="toggleBldg()">
    <span>3D Buildings</span><span class="badge">593k</span>
  </div>
  <div class="layer-row">
    <input type="checkbox" id="terrOn" checked onchange="toggleTerr()">
    <span>3D Terrain</span><span class="badge">USGS</span>
  </div>
</div>

<div id="info">
  <h3>Selected Building</h3>
  <div class="info-row"><span class="lbl">Height</span><span class="val" id="iH">—</span></div>
  <div class="info-row"><span class="lbl">Floors</span><span class="val" id="iF">—</span></div>
  <div class="info-row"><span class="lbl">Height Data</span><span id="iS"></span></div>
</div>

<script>
  // Cesium ion token (free tier — get yours at cesium.com/ion)
  // No ion token needed — using flat terrain

  const viewer = new Cesium.Viewer('cesiumContainer', {
    terrainProvider: new Cesium.EllipsoidTerrainProvider(),
    baseLayerPicker: false,
    geocoder: false,
    homeButton: false,
    sceneModePicker: false,
    navigationHelpButton: false,
    animation: false,
    timeline: false,
    fullscreenButton: false,
    vrButton: false,
    infoBox: false,
    selectionIndicator: false,
  });

  // FW default view
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(-97.33, 32.76, 15000),
    orientation: { heading: 0.2, pitch: -0.5, roll: 0 },
    duration: 0,
  });

  // Height → color (3m dark blue → 25m+ orange-red)
  function hColor(m) {
    const t = Math.min(1, Math.max(0, (m - 3) / 22));
    let r, g, b;
    if (t < 0.25) {
      r = Math.round(26 + t * 4 * 50); g = Math.round(61 + t * 4 * 120); b = Math.round(107 + t * 4 * 20);
    } else if (t < 0.5) {
      const u = t - 0.25;
      r = Math.round(76 + u * 4 * 168); g = Math.round(181 + u * 4 * 20); b = Math.round(127 - u * 4 * 50);
    } else if (t < 0.75) {
      const u = t - 0.5;
      r = Math.round(244 + u * 4 * 10); g = Math.round(201 - u * 4 * 40); b = Math.round(77 - u * 4 * 77);
    } else {
      const u = t - 0.75;
      r = Math.round(254 - u * 4 * 10); g = Math.round(161 - u * 4 * 95); b = Math.round(0);
    }
    return Cesium.Color.fromBytes(r, g, b, 210);
  }

  // Build 3D buildings
  const bldgEntities = [];

  fetch('/3d/buildings-sample.json')
    .then(r => r.json())
    .then(data => {
      const feats = (data.features || []).slice(0, 30000);
      document.getElementById('status').textContent =
        `Rendering ${feats.length.toLocaleString()} buildings...`;

      for (const f of feats) {
        const p = f.properties || {};
        const h = Number(p._3d_height_m) || 3;
        const src = p._3d_height_source || 'estimated';

        const coords = f.geometry.coordinates[0];
        if (!coords || coords.length < 3) continue;

        // Close the ring
        const ring = coords.slice();
        const a = ring[0], b2 = ring[ring.length - 1];
        if (a[0] !== b2[0] || a[1] !== b2[1]) ring.push([a[0], a[1]]);

        const flat = [];
        for (const c of ring) { flat.push(c[0], c[1]); }

        const ent = viewer.entities.add({
          polygon: {
            hierarchy: Cesium.PolygonHierarchy.fromPositions(
              Cesium.Cartesian3.fromDegreesArray(flat)
            ),
            height: 0,
            extrudedHeight: h,
            material: hColor(h),
            outline: false,
          },
          properties: { _src: src, _h: h },
        });
        bldgEntities.push(ent);
      }

      document.getElementById('loading').style.display = 'none';
    })
    .catch(err => {
      document.getElementById('status').textContent = 'Load failed: ' + err.message;
      console.error(err);
    });

  // Click to inspect
  const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
  handler.setInputAction(function(click) {
    const pick = viewer.scene.pick(click.position);
    const info = document.getElementById('info');
    if (pick && pick.id && pick.id.properties && pick.id.properties._h !== undefined) {
      const p = pick.id.properties;
      document.getElementById('iH').textContent = p._h._value.toFixed(1) + 'm';
      document.getElementById('iF').textContent = Math.round(p._h._value / 3.5) + ' floors';
      const isMapbox = p._src._value === 'mapbox';
      document.getElementById('iS').innerHTML =
        '<span class="tag ' + (isMapbox ? 't-mapbox' : 't-estimated') + '">' +
        (isMapbox ? 'Mapbox Streets v8' : 'Estimated from area') + '</span>';
      info.classList.add('show');
    } else {
      info.classList.remove('show');
    }
  }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

  function toggleBldg() {
    const show = document.getElementById('bldgOn').checked;
    bldgEntities.forEach(e => { e.show = show; });
  }

  function toggleTerr() {
    const on = document.getElementById('terrOn').checked;
    viewer.terrainProvider = on
      new Cesium.EllipsoidTerrainProvider();
  }

  async function geocode() {
    const addr = document.getElementById('addrInput').value.trim();
    if (!addr) return;
    try {
      const url = 'https://geocoding.geo.census.gov/geocoder/geographies/onelineaddress' +
        '?address=' + encodeURIComponent(addr + ', Fort Worth, TX') +
        '&benchmark=4&vintage=4&format=json';
      const r = await fetch(url);
      const d = await r.json();
      const m = d.result && d.result.addressMatches && d.result.addressMatches[0];
      if (!m) { alert('Address not found'); return; }
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(m.coordinates.x, m.coordinates.y, 600),
        orientation: { heading: 0, pitch: -0.4, roll: 0 },
        duration: 2,
      });
    } catch(e) { alert('Geocoding failed: ' + e.message); }
  }
</script>
</body>
</html>
